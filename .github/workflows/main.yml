# Runs 5 times per week. Commits are authored as YOU so they count on your profile.
# Requires repo secrets: PAT, COMMITTER_EMAIL (and optionally COMMITTER_NAME).
name: automatic commits (5x/week, random count)
on:
  schedule:
    - cron: '0 14 * * 1'
    - cron: '0 15 * * 2'
    - cron: '0 13 * * 3'
    - cron: '0 16 * * 4'
    - cron: '0 12 * * 5'
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT }}

      - name: Create random number of commits and push
        env:
          COMMITTER_NAME: ${{ secrets.COMMITTER_NAME }}
          COMMITTER_EMAIL: ${{ secrets.COMMITTER_EMAIL }}
        run: |
          N=$((RANDOM % 5 + 1))
          echo "Creating $N commits"
          git config user.name "${COMMITTER_NAME:-$GITHUB_ACTOR}"
          git config user.email "$COMMITTER_EMAIL"
          mkdir -p ./files
          for i in $(seq 1 $N); do
            F="./files/$(date +%s)-$i.emojic"
            echo "🟩 Green chart - commit $i of $N ($(date -Iseconds)) 🟩" > "$F"
            git add "$F"
            git commit -m "chore: auto commit $i/$N [skip ci]"
          done
          git push
